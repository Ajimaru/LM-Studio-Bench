[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=agents.cache
    --cov=agents.capabilities
    --cov=cli.benchmark
    --cov=cli.metrics
    --cov=cli.reporting
    --cov=core
    --cov=web.app
    --cov=tools
    --cov=run
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -v
