[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=cli.benchmark
    --cov=cli.metrics
    --cov=core.config
    --cov=core.paths
    --cov=core.presets
    --cov=core.client
    --cov=core.version
    --cov=web
    --cov=tools
    --cov=run
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -v
