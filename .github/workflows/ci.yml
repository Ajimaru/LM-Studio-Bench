# CI workflow runs syntax validation and unit tests with coverage
name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  # allow manual invocation from Actions tab for testing
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      # check out repository code
      - name: Checkout
        uses: actions/checkout@v6

      # prepare Python environment for later checks
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # ensure main python script compiles
      - name: Python syntax check (main script)
        run: python -m py_compile run.py

      # check all Python modules in src/
      - name: Python syntax check (src modules)
        run: |
          python -m py_compile src/benchmark.py
          python -m py_compile src/config_loader.py
          python -m py_compile src/user_paths.py
          python -m py_compile src/tray.py
          python -m py_compile src/version_checker.py
          python -m py_compile src/rest_client.py
          python -m py_compile src/preset_manager.py

      # verify shell script syntax
      - name: Bash syntax check
        run: |
          bash -n setup.sh

      # install shellcheck if not available
      - name: Install shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      # lint the shell scripts
      - name: Shellcheck
        run: shellcheck --exclude=SC1091 setup.sh

      # test that main entry point works
      - name: Test entry point
        run: |
          python run.py --help 2>&1 | head -20 || true

  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        run-coverage: [true]

    steps:
      # checkout the repo for tests
      - name: Checkout
        uses: actions/checkout@v6

      # set up same Python version
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # install system dependencies for PyGObject (optional)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0 \
            libcairo2 \
            libcairo2-dev \
            gobject-introspection

      # install test dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-optional.txt

      # execute unit tests and collect coverage
      - name: Run tests (with coverage)
        if: ${{ matrix.run-coverage }}
        run: |
          pytest --cov-report=xml:coverage.xml

      # send coverage report to Codecov
      - name: Upload coverage to Codecov
        if: ${{ matrix.run-coverage && github.repository == 'Ajimaru/LM-Studio-Bench' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      # optionally report coverage to Codacy
      - name: Upload coverage to Codacy
        if: ${{ matrix.run-coverage && github.repository == 'Ajimaru/LM-Studio-Bench' }}
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODACY_ORGANIZATION_PROVIDER: ${{ vars.CODACY_ORGANIZATION_PROVIDER }}
          CODACY_USERNAME: ${{ vars.CODACY_USERNAME }}
          CODACY_PROJECT_NAME: ${{ vars.CODACY_PROJECT_NAME }}
        continue-on-error: true
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage.xml -t "$CODACY_API_TOKEN"
