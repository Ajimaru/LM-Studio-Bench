name: AppImage Compatibility Test

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: Ubuntu 22.04
            image: ubuntu:22.04
          - distro: Ubuntu 24.04
            image: ubuntu:24.04
          - distro: Debian 12
            image: debian:12
          - distro: Fedora 40
            image: fedora:40
          - distro: openSUSE Tumbleweed
            image: opensuse/tumbleweed

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: appimage
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Make AppImage executable
        run: chmod +x dist/*.AppImage

      - name: Test AppImage on ${{ matrix.distro }}
        run: |
          APPIMAGE="$(ls dist/*.AppImage | head -1)"
          echo "Testing: $APPIMAGE"
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -e APPIMAGE_EXTRACT_AND_RUN=1 \
            "${{ matrix.image }}" \
            sh -c '
              set -e
              APPIMAGE="$(ls /dist/*.AppImage | head -1)"
              echo "=== AppImage: $APPIMAGE ==="
              echo "=== Distro info ==="
              cat /etc/os-release 2>/dev/null || true

              echo "=== Extracting AppImage ==="
              "$APPIMAGE" --appimage-extract > /dev/null

              echo "=== Verifying bundled Python ==="
              if [ -f squashfs-root/usr/venv/bin/python3 ]; then
                squashfs-root/usr/venv/bin/python3 --version
              else
                echo "ERROR: Bundled Python not found" >&2
                exit 1
              fi

              echo "=== Verifying entrypoint scripts ==="
              test -f squashfs-root/AppRun || \
                { echo "ERROR: AppRun missing" >&2; exit 1; }
              test -f squashfs-root/usr/bin/lmstudio-bench || \
                { echo "ERROR: lmstudio-bench script missing" >&2; exit 1; }
              test -f squashfs-root/usr/share/lm-studio-bench/run.py || \
                { echo "ERROR: run.py missing" >&2; exit 1; }

              echo "=== Testing Python imports ==="
              cd squashfs-root/usr/share/lm-studio-bench
              PYTHONPATH="." \
                ../../../venv/bin/python3 -c "import importlib, sys; sys.path.insert(0, \".\"); modules = [\"core.config\", \"core.paths\", \"core.version\"]; [importlib.import_module(mod) for mod in modules]; print(\"Import check done\")"

              echo "=== PASS: $APPIMAGE on $(cat /etc/os-release | grep PRETTY | cut -d= -f2) ==="
            '
