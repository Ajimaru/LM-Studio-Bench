name: Capability-Driven Benchmark

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      model_path:
        description: 'Model path or identifier'
        required: false
        default: ''
      capabilities:
        description: 'Comma-separated capabilities'
        required: false
        default: 'general_text'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Create output directory
        run: mkdir -p output

      - name: Run capability-driven benchmark
        id: benchmark
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.model_path }}" ]; then
            MODEL_PATH="${{ github.event.inputs.model_path }}"
            CAPABILITIES="${{ github.event.inputs.capabilities }}"
            # Temporarily disable 'set -e' so we can capture the exit code
            set +e
            python -m bench.cli \
              "$MODEL_PATH" \
              --capabilities "$CAPABILITIES" \
              --output-dir output \
              --verbose
            exit_code=$?
            # Optionally re-enable 'set -e' for any subsequent commands
            set -e

            if [ "$exit_code" -eq 0 ]; then
              echo "status=completed" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
            fi

            exit "$exit_code"
          else
            echo "No model path provided, skipping benchmark execution"
            echo "This workflow can be triggered manually with model path"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Upload JSON results
        if: steps.benchmark.outputs.status == 'completed'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-json
          path: output/*.json
          retention-days: 30

      - name: Upload HTML reports
        if: steps.benchmark.outputs.status == 'completed'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-html
          path: output/*.html
          retention-days: 30

      - name: Upload raw outputs
        if: steps.benchmark.outputs.status == 'completed'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-raw-outputs
          path: output/raw/*.json
          retention-days: 7

      - name: Comment on PR
        if: |
          steps.benchmark.outputs.status == 'completed' &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsFiles = fs.readdirSync('output')
              .filter(f => f.endsWith('.json'));

            if (resultsFiles.length === 0) {
              return;
            }

            const resultsPath = `output/${resultsFiles[0]}`;
            const results = JSON.parse(
              fs.readFileSync(resultsPath, 'utf8')
            );

            const report = results.report;
            const summary = report.summary;

            const comment = `
            ## Capability-Driven Benchmark Results

            **Model:** ${report.model_name}
            **Capabilities:** ${report.capabilities.join(', ')}

            ### Summary
            - Total Tests: ${summary.total_tests}
            - Success Rate: ${(summary.success_rate * 100).toFixed(1)}%
            - Avg Quality: ${summary.avg_quality_score.toFixed(3)}
            - Avg Latency: ${summary.avg_latency_ms.toFixed(2)} ms

            [View full HTML report in artifacts]
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
