# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up Snyk to analyze the full Snyk platform
# (Snyk Open Source, Snyk Code)
# The setup installs the Snyk CLI - for more details on the possible
# commands check https://docs.snyk.io/snyk-cli/cli-reference
# The results of Snyk Code are then uploaded to GitHub Security Code
# Scanning
#
# In order to use the Snyk Action you will need to have a Snyk API token.
# More details in https://github.com/snyk/actions#getting-your-snyk-token
# or you can signup for free at https://snyk.io/login
#
# For more examples, including how to limit scans to only high-severity
# issues and fail PR checks, see https://github.com/snyk/actions/
#
# Note: This workflow requires the SNYK_TOKEN secret to be set in the
# repository settings. If the token is not set, the workflow will be
# skipped.

name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Check SNYK_TOKEN configuration
        id: snyk_token
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN is not set. Skipping Snyk scans."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.snyk_token.outputs.configured == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies
        if: steps.snyk_token.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libcairo2-dev \
            libgirepository1.0-dev \
            pkg-config

      - name: Install dependencies
        if: steps.snyk_token.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Snyk CLI to check for security issues
        if: steps.snyk_token.outputs.configured == 'true'
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk Code test
        if: steps.snyk_token.outputs.configured == 'true'
        continue-on-error: true
        run: snyk code test --sarif-file-output=snyk-code.sarif || true

      - name: Snyk Open Source test
        if: steps.snyk_token.outputs.configured == 'true'
        continue-on-error: true
        run: snyk test --all-projects || true

      - name: Upload result to GitHub Code Scanning
        if: |
          always() &&
          steps.snyk_token.outputs.configured == 'true' &&
          hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
